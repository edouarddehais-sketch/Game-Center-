<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puissance 4</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
margin-top:20px;
font-size:50px;
text-shadow:0 0 20px white;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white; }
to{ text-shadow:0 0 30px white; }
}

#status{
font-size:24px;
margin:20px;
}

.board{
display:grid;
grid-template-columns:repeat(7,90px);
gap:8px;
background:#111;
padding:15px;
border-radius:20px;
box-shadow:0 0 25px white;
}

.cell{
width:90px;
height:90px;
background:#222;
border-radius:50%;
cursor:pointer;
transition:0.2s;
}

.cell:hover{
transform:scale(1.05);
}

.red{
background:red;
animation:drop .3s;
}

.yellow{
background:gold;
animation:drop .3s;
}

@keyframes drop{
from{ transform:translateY(-80px); }
to{ transform:translateY(0); }
}

button{
margin-top:25px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<h1>PUISSANCE 4</h1>

<div id="status">Tour : 🔴 Rouge</div>

<div class="board" id="board"></div>

<button onclick="restart()">Recommencer</button>

<script>

const ROWS = 6;
const COLS = 7;

let board = [];
let currentPlayer = 1;
let gameOver = false;

const boardDiv = document.getElementById("board");
const statusText = document.getElementById("status");

function createBoard(){
board = [];
boardDiv.innerHTML = "";

for(let r=0;r<ROWS;r++){
board[r] = [];

for(let c=0;c<COLS;c++){
board[r][c] = 0;

const cell = document.createElement("div");
cell.classList.add("cell");

cell.dataset.col = c;
cell.dataset.row = r;

cell.addEventListener("click", () => play(c));

boardDiv.appendChild(cell);
}
}
}

function play(col){
if(gameOver) return;

for(let r=ROWS-1;r>=0;r--){
if(board[r][col] === 0){

board[r][col] = currentPlayer;

draw();

if(checkWin(r,col)){
statusText.textContent =
(currentPlayer===1 ? "🔴 Rouge" : "🟡 Jaune") + " gagne !";
gameOver = true;
return;
}

currentPlayer = currentPlayer === 1 ? 2 : 1;

statusText.textContent =
"Tour : " + (currentPlayer===1 ? "🔴 Rouge" : "🟡 Jaune");

return;
}
}
}

function draw(){
const cells = document.querySelectorAll(".cell");

cells.forEach(cell=>{
let r = cell.dataset.row;
let c = cell.dataset.col;

cell.className = "cell";

if(board[r][c] === 1) cell.classList.add("red");
if(board[r][c] === 2) cell.classList.add("yellow");
});
}

function checkDir(r,c,dr,dc){
let player = board[r][c];
let count = 1;

let rr = r + dr;
let cc = c + dc;

while(rr>=0 && rr<ROWS && cc>=0 && cc<COLS && board[rr][cc]===player){
count++;
rr += dr;
cc += dc;
}

rr = r - dr;
cc = c - dc;

while(rr>=0 && rr<ROWS && cc>=0 && cc<COLS && board[rr][cc]===player){
count++;
rr -= dr;
cc -= dc;
}

return count >= 4;
}

function checkWin(r,c){
return (
checkDir(r,c,1,0) ||
checkDir(r,c,0,1) ||
checkDir(r,c,1,1) ||
checkDir(r,c,1,-1)
);
}

function restart(){
currentPlayer = 1;
gameOver = false;
statusText.textContent = "Tour : 🔴 Rouge";
createBoard();
}

createBoard();

</script>

</body>
</html>
