<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Center</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
}

/* HEADER */
header{
height:220px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(90deg,#000,#111,#000);
border-bottom:3px solid white;
}

.logo{
font-size:70px;
font-weight:bold;
letter-spacing:5px;
animation:glow 2s infinite alternate;
text-transform:uppercase;
}

@keyframes glow{
from{
text-shadow:0 0 10px white, 0 0 20px white;
transform:scale(1);
}
to{
text-shadow:0 0 20px white, 0 0 50px white;
transform:scale(1.05);
}
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
padding:50px;
}

/* BOUTONS */
.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.game{
background:white;
color:black;
padding:25px;
border-radius:15px;
font-size:20px;
font-weight:bold;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.game:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 25px white;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:#777;
margin-top:50px;
}

</style>
</head>

<body>

<header>
<div class="logo">GAME CENTER</div>

<p style="
    text-align:center;
    font-size:22px;
    margin-top:10px;
    color:white;
    text-shadow:0 0 10px white;
    ">
    Créé par Dehais Edouard
    </p>

</div>

</header>

<div class="container">

<div class="games">

<div class="game" onclick="window.location.href='puissance4.html'">
🎮 Puissance 4
</div>

<div class="game" onclick="window.location.href='multiplication.html'">
🧮 Multiplication 2 Joueurs
</div>
<div class="game" onclick="window.location.href='morpion.html'">❌ Morpion</div>
<div class="game" onclick="window.location.href='jump.html'">
🦘 Jump Game
</div>
<div class="game" onclick="window.location.href='pieces.html'">
🪙 Chasseur de Pièces
</div>
<div class="game" onclick="window.location.href='quiz.html'">
🧠 Culture Générale
</div>

</div>

</div>

<footer>
Game Center © 2026
</footer>

</body>
</html>
