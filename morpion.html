<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morpion</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
}

/* Titre animé */
h1{
font-size:50px;
letter-spacing:3px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px white,0 0 20px white;
}
to{
text-shadow:0 0 25px white,0 0 50px white;
}
}

/* grille */
.board{
display:grid;
grid-template-columns:repeat(3,120px);
grid-template-rows:repeat(3,120px);
gap:10px;
margin-top:20px;
}

/* cases */
.cell{
background:#111;
border:2px solid white;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;
cursor:pointer;
transition:0.2s;
border-radius:10px;
}

.cell:hover{
transform:scale(1.05);
box-shadow:0 0 15px white;
}

/* animation placement */
.cell.pop{
animation:pop 0.2s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

/* message */
#status{
margin-top:20px;
font-size:25px;
}

button{
margin-top:20px;
padding:10px 20px;
font-size:18px;
border:none;
cursor:pointer;
border-radius:10px;
background:white;
color:black;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px white;
}

</style>
</head>

<body>

<h1>MORPION</h1>

<div id="status">Tour : X</div>

<div class="board" id="board"></div>

<button onclick="resetGame()">Recommencer</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let currentPlayer = "X";
let gameActive = true;
let cells = ["","","","","","","","",""];

function createBoard(){
board.innerHTML="";
cells.forEach((cell,index)=>{
const div = document.createElement("div");
div.classList.add("cell");
div.dataset.index = index;

div.addEventListener("click",()=>{
if(!gameActive || cells[index] !== "") return;

cells[index] = currentPlayer;
div.textContent = currentPlayer;
div.classList.add("pop");

checkWinner();
currentPlayer = currentPlayer === "X" ? "O" : "X";

if(gameActive){
statusText.textContent = "Tour : " + currentPlayer;
}
});

board.appendChild(div);
});
}

function checkWinner(){
const win = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

for(let condition of win){
let [a,b,c] = condition;
if(cells[a] && cells[a] === cells[b] && cells[a] === cells[c]){
statusText.textContent = "🏆 " + cells[a] + " a gagné !";
gameActive = false;
return;
}
}

if(!cells.includes("")){
statusText.textContent = "Match nul !";
gameActive = false;
}
}

function resetGame(){
cells = ["","","","","","","","",""];
currentPlayer = "X";
gameActive = true;
statusText.textContent = "Tour : X";
createBoard();
}

createBoard();
</script>

</body>
</html>
